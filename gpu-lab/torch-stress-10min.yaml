apiVersion: batch/v1
kind: Job
metadata:
  name: torch-stress-10min
  namespace: gpu-lab
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: torch-stress-10min
    spec:
      restartPolicy: Never
      containers:
        - name: stress
          image: pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -c
            - |
              import torch
              import time
              import sys

              DURATION_SEC = 600  # 10 minutes

              if not torch.cuda.is_available():
                  print("ERROR: CUDA is not available!", file=sys.stderr)
                  sys.exit(1)

              print("=" * 50)
              print("GPU stress — 10 minutes")
              print("=" * 50)
              print(f"GPU model      : {torch.cuda.get_device_name(0)}")
              print(f"Duration       : {DURATION_SEC}s")
              print("=" * 50)

              N = 4096
              A = torch.randn(N, N, device="cuda", dtype=torch.float32)
              B = torch.randn(N, N, device="cuda", dtype=torch.float32)

              end_time = time.time() + DURATION_SEC
              step = 0
              t0 = time.time()

              while time.time() < end_time:
                  torch.matmul(A, B)
                  torch.cuda.synchronize()
                  step += 1
                  if step % 50 == 0:
                      elapsed = time.time() - t0
                      remaining = max(0, DURATION_SEC - elapsed)
                      print(f"step {step}, elapsed {elapsed:.0f}s, remaining ~{remaining:.0f}s")

              print("=" * 50)
              print(f"Done. Total matmul steps: {step}")
              print("=" * 50)
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            limits:
              cpu: "4"
              memory: 8Gi
              nvidia.com/gpu: "1"
            requests:
              cpu: "2"
              memory: 4Gi
              nvidia.com/gpu: "1"
