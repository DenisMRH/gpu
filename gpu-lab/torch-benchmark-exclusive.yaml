apiVersion: batch/v1
kind: Job
metadata:
  name: torch-benchmark
  namespace: gpu-lab
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: torch-benchmark
        mode: exclusive
    spec:
      restartPolicy: Never
      containers:
        - name: benchmark
          image: pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -c
            - |
              import torch
              import time
              import sys

              print("=" * 50)
              print("PyTorch GPU Benchmark — Exclusive mode")
              print("=" * 50)

              if not torch.cuda.is_available():
                  print("ERROR: CUDA is not available!", file=sys.stderr)
                  sys.exit(1)

              print(f"GPU model      : {torch.cuda.get_device_name(0)}")
              print(f"CUDA version   : {torch.version.cuda}")
              print(f"GPU memory     : {torch.cuda.get_device_properties(0).total_memory / 1024**3:.1f} GB")
              print("=" * 50)

              N = 4096
              STEPS = 20
              WARMUP = 5

              A = torch.randn(N, N, device='cuda', dtype=torch.float32)
              B = torch.randn(N, N, device='cuda', dtype=torch.float32)

              # Warmup
              for _ in range(WARMUP):
                  C = torch.matmul(A, B)
              torch.cuda.synchronize()

              times = []
              peak_mem_before = torch.cuda.memory_allocated()
              for step in range(STEPS):
                  t0 = time.perf_counter()
                  C = torch.matmul(A, B)
                  torch.cuda.synchronize()
                  t1 = time.perf_counter()
                  times.append(t1 - t0)

              peak_cuda_mem_gb = torch.cuda.max_memory_allocated() / 1024**3

              avg = sum(times) / len(times)
              print(f"avg_step_sec   : {avg:.4f}")
              print(f"min_step_sec   : {min(times):.4f}")
              print(f"max_step_sec   : {max(times):.4f}")
              print(f"peak_cuda_mem_gb: {peak_cuda_mem_gb:.3f}")
              print("=" * 50)
              print("Benchmark complete.")
          resources:
            limits:
              cpu: "4"
              memory: 8Gi
              nvidia.com/gpu: "1"
            requests:
              cpu: "2"
              memory: 4Gi
              nvidia.com/gpu: "1"
